# 个人投资平台配置
database: data/quant.db
history_start: "2015-01-01"

backtest:
  cost_bps: 5           # 单边交易成本（基点，万5），戳破零成本换仓的虚高

# 关注列表（按组划分，策略通过 groups 指定作用范围）
watchlist:
  broad:                # 大盘 ETF
    - SPY
    - QQQ
    - IWM
    - DIA
  sectors:              # 行业 ETF（动量轮动宇宙）
    - XLK
    - XLV
    - XLF
    - XLY
    - XLP
    - XLE
    - XLI
    - XLB
    - XLU
    - XLRE
    - XLC
  themes:               # 热门主题 ETF
    - SMH               # 半导体（含美光等 DRAM/存储厂商）
    - SOXX              # 半导体
    - IGV               # 软件
  assets:               # 资产类 ETF
    - TLT               # 长期国债
    - GLD               # 黄金
    - IBIT              # 比特币
  # ── 以下三组仅拉数据/展示与未来跨资产用，组名未被任何策略 groups 引用 → 不喂给现有策略 ──
  # （加入前用日收益相关性筛过：只留与现有池低相关=真加信息的，冗余的如 VGT/VNQ/XSD/XOP 已剔）
  cross_asset:          # 跨资产分散（跨资产动量的原料，backlog #6）
    - DBC               # 广谱商品（与现有池相关最低 r≈0.62）
    - VWO               # 新兴市场（r≈0.69）
    - VEA               # 发达市场（美国以外，r≈0.77）
    - HYG               # 高收益信用债（r≈0.75）
  cross_asset_mom_universe:  # 跨资产动量轮动宇宙（9类低相关资产）
    - SPY               # 美股大盘
    - QQQ               # 纳指100
    - VEA               # 发达市场（美国以外）
    - VWO               # 新兴市场
    - TLT               # 长期国债
    - HYG               # 高收益信用债
    - GLD               # 黄金
    - DBC               # 广谱商品
    - XLRE              # REITs
  sub_themes:           # 细分主题（独立于宽科技的子周期）
    - DRAM              # 存储/内存（Roundhill；与宽半导体 r≈0.87，最分化的半导体子行业；历史仅约3月）
    - XBI               # 生物科技（等权，特质性强 r≈0.70）
  factor_bench:         # 因子基准 ETF（不图分散，图对标自制因子）
    - RSP               # 标普500等权（= 我们手算的等权基准）
    - USMV              # 最小波动（low_vol 的官方对标）
    - MTUM              # 动量因子
  aggressive_growth:    # 进攻档宇宙：成长/科技 ETF（进攻）+ TLT（避险）
    - QQQ               # 纳指100
    - XLK               # 科技
    - SMH               # 半导体
    - IGV               # 软件
    - XLY               # 可选消费
    - XBI               # 生物科技
    - TLT               # 长债（现金感知避险，非进攻）
  volatility:           # 波动率指数（不可交易，用于情绪/风险信号）
    - ^VIX              # 恐慌指数
    - ^VIX3M            # 三个月期 VIX
  macro:                # 宏观指数与资产（纯展示，不喂给任何策略）
    - ^GSPC              # 标普500指数
    - ^IXIC              # 纳斯达克综合指数
    - ^DJI                # 道琼斯工业指数
    - ^RUT                # 罗素2000指数
    - ^TNX                # 10年期美债收益率
    - ^IRX                # 3个月期美债收益率
    - DX-Y.NYB            # 美元指数
    - GC=F                # 黄金期货
    - CL=F                # 原油 WTI 期货
    - BTC-USD             # 比特币

strategies:
  sma_cross:
    enabled: true
    fast: 20
    slow: 60
    groups: [broad, themes, assets]
  momentum:               # 行业 12-1 月度动量轮动：旧版（63日/每日进出）whipsaw 严重，
    enabled: true         # 短期反转频繁买在山顶，实测跑输板块等权；改为 12-1 月度拿得更稳
    lookback_days: 252    # 动量回看约 12 个月
    skip_days: 21         # 跳过最近约 1 个月（12-1 口径，避开短期反转买在山顶）
    top_n: 3
    groups: [sectors]
  rsi_reversal:
    enabled: true
    period: 14
    oversold: 30
    overbought: 70
    groups: [broad, sectors, themes, assets]
  smart_dca:              # 定投+信号开关：死叉暂停积攒，金叉恢复补投
    enabled: true
    symbol: SPY
    fast: 20
    slow: 60
    groups: [broad]
  dual_momentum:          # GEM 双动量：动量转负切换避险资产
    enabled: true
    lookback_days: 252    # 约 12 个月
    risk_assets: [SPY, QQQ]
    safe_asset: TLT
    groups: [broad, assets]
  vix_regime:             # VIX 情绪/风险提醒：恐慌区、自满区、期限倒挂
    enabled: true
    vix: ^VIX
    vix3m: ^VIX3M
    panic: 30             # 恐慌阈值
    complacency: 15       # 自满阈值
    trade_symbol: SPY     # 回测时把提醒映射到该标的执行
    groups: [volatility]
  stock_momentum:         # 个股横截面动量：动态流动性池 + 12-1 动量 + 大盘过滤
    enabled: true
    universe_file: universe_sp500.yaml
    pool_size: 100        # 每月按成交额取前 N 构成选股池（point-in-time）
    liquidity_window: 20  # 成交额排名窗口（日）
    lookback_days: 252    # 动量回看约 12 个月
    skip_days: 21         # 跳过最近 1 个月（12-1 口径，避开短期反转）
    top_n: 6              # 持有动量最强的前 N 只
    max_per_sector: 2     # 单行业上限
    regime_symbol: SPY
    regime_ma: 200        # 大盘跌破 200 日均线 → 整体切避险
    safe_asset: TLT
    groups: [broad, assets]
  low_vol:                  # 低波动因子：一篮子 ETF 中波动最低的前 N 只，首个非动量分散因子
    enabled: true
    lookback_days: 90       # 波动率回看窗口（日），约 4 个月
    top_n: 3                # 持有波动最低的前 N 只
    groups: [sectors, assets]  # 行业 ETF + 资产类（含 TLT 长债/GLD 黄金）：
                            # 扩宇宙让低波动能选到非股票资产，降低与动量家族的相关性
                            # （sectors-only 时因同为长多股票、共享市场beta，相关仍约0.5）
  cross_asset_mom:            # 跨资产 12-1 月度动量轮动 + 绝对动量开关（稳健档）
    enabled: true             # 首个干净跑赢公平基准的动量策略
    lookback_days: 252        # 动量回看约 12 个月（与 momentum/stock_momentum 一致）
    skip_days: 21             # 跳过最近约 1 个月（12-1 口径，避开短期反转）
    top_n: 3                  # 每月持有动量最强的前 3 类资产
    abs_momentum: true        # 绝对动量开关：动量为负不买入持现金（熊市保险）
    groups: [cross_asset_mom_universe]  # 9 类低相关资产宇宙
                              # 实测 top3+abs：+237%/夏普0.80/回撤-21.5%/Calmar0.52
                              # 跑赢等权全资产基准（+172%/0.39），动量真加了信息
  aggressive_mom:             # 进攻档：成长 ETF 集中 12-1 动量 + 现金感知避险
    enabled: true             # 目标够 QQQ 增长同时控回撤
    lookback_days: 252        # 动量回看约 12 个月
    skip_days: 21             # 跳过最近约 1 个月（12-1 口径）
    top_n: 1                  # 集中持有动量最强的 1 只成长 ETF
    safe_assets: [TLT]        # 现金感知避险：成长转负切正动量避险，避险也负则持现金
    groups: [aggressive_growth]  # 成长/科技 ETF + TLT 避险
                              # 实测 top1：+766%/年化20.6%/回撤-34%/Calmar0.60
                              # 跑赢 QQQ 收益(+635%)且回撤≈QQQ；walk-forward 两段都成立
                              # 诚实：集中成长押注，成长失宠会落后，比 cross_asset_mom 波动大

notify:
  telegram: true        # 需在 .env 配置 TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID
  email: true           # 需在 .env 配置 SMTP_HOST / SMTP_USER / SMTP_PASSWORD / EMAIL_TO
