# 个人量化信号平台配置
database: data/quant.db
history_start: "2015-01-01"

backtest:
  cost_bps: 5           # 单边交易成本（基点，万5），戳破零成本换仓的虚高

# 关注列表（按组划分，策略通过 groups 指定作用范围）
watchlist:
  broad:                # 大盘 ETF
    - SPY
    - QQQ
    - IWM
    - DIA
  sectors:              # 行业 ETF（动量轮动宇宙）
    - XLK
    - XLV
    - XLF
    - XLY
    - XLP
    - XLE
    - XLI
    - XLB
    - XLU
    - XLRE
    - XLC
  themes:               # 热门主题 ETF
    - SMH               # 半导体（含美光等 DRAM/存储厂商）
    - SOXX              # 半导体
    - IGV               # 软件
  assets:               # 资产类 ETF
    - TLT               # 长期国债
    - GLD               # 黄金
    - IBIT              # 比特币
  volatility:           # 波动率指数（不可交易，用于情绪/风险信号）
    - ^VIX              # 恐慌指数
    - ^VIX3M            # 三个月期 VIX
  macro:                # 宏观指数与资产（纯展示，不喂给任何策略）
    - ^GSPC              # 标普500指数
    - ^IXIC              # 纳斯达克综合指数
    - ^DJI                # 道琼斯工业指数
    - ^RUT                # 罗素2000指数
    - ^TNX                # 10年期美债收益率
    - ^IRX                # 3个月期美债收益率
    - DX-Y.NYB            # 美元指数
    - GC=F                # 黄金期货
    - CL=F                # 原油 WTI 期货
    - BTC-USD             # 比特币

strategies:
  sma_cross:
    enabled: true
    fast: 20
    slow: 60
    groups: [broad, themes, assets]
  momentum:
    enabled: true
    lookback_days: 63   # 约 3 个月
    top_n: 3
    groups: [sectors]
  rsi_reversal:
    enabled: true
    period: 14
    oversold: 30
    overbought: 70
    groups: [broad, sectors, themes, assets]
  smart_dca:              # 定投+信号开关：死叉暂停积攒，金叉恢复补投
    enabled: true
    symbol: SPY
    fast: 20
    slow: 60
    groups: [broad]
  dual_momentum:          # GEM 双动量：动量转负切换避险资产
    enabled: true
    lookback_days: 252    # 约 12 个月
    risk_assets: [SPY, QQQ]
    safe_asset: TLT
    groups: [broad, assets]
  vix_regime:             # VIX 情绪/风险提醒：恐慌区、自满区、期限倒挂
    enabled: true
    vix: ^VIX
    vix3m: ^VIX3M
    panic: 30             # 恐慌阈值
    complacency: 15       # 自满阈值
    trade_symbol: SPY     # 回测时把提醒映射到该标的执行
    groups: [volatility]
  stock_momentum:         # 个股横截面动量：动态流动性池 + 12-1 动量 + 大盘过滤
    enabled: true
    universe_file: universe_sp500.yaml
    pool_size: 100        # 每月按成交额取前 N 构成选股池（point-in-time）
    liquidity_window: 20  # 成交额排名窗口（日）
    lookback_days: 252    # 动量回看约 12 个月
    skip_days: 21         # 跳过最近 1 个月（12-1 口径，避开短期反转）
    top_n: 6              # 持有动量最强的前 N 只
    max_per_sector: 2     # 单行业上限
    regime_symbol: SPY
    regime_ma: 200        # 大盘跌破 200 日均线 → 整体切避险
    safe_asset: TLT
    groups: [broad, assets]
  low_vol:                  # 低波动因子：行业 ETF 中波动最低的前 N 只，首个非动量分散因子
    enabled: true
    lookback_days: 90       # 波动率回看窗口（日），约 4 个月
    top_n: 3                # 持有波动最低的前 N 只
    groups: [sectors]       # 与 momentum 同宇宙、反选择标准，便于相关性对照

notify:
  telegram: true        # 需在 .env 配置 TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID
  email: true           # 需在 .env 配置 SMTP_HOST / SMTP_USER / SMTP_PASSWORD / EMAIL_TO
